apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ppl-app-default-deny
spec:
  podSelector:
    matchLabels:
      app: ppl-app
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ppl-app-allow
spec:
  podSelector:
    matchLabels:
      app: ppl-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53