apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ppl-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ppl-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120